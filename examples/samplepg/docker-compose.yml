version: "3.9"
services:
  postgres:
    image: postgres:15-alpine
    container_name: postgres_dev
    environment:
      POSTGRES_USER: myapp
      POSTGRES_PASSWORD: myapp
      POSTGRES_DB: myapp 
    ports:
      - "5432:5432"
    networks:
      - dev-network
    volumes:
      - postgres_data:/var/lib/postgresql/data
volumes:
  postgres_data:
networks:
  dev-network:
